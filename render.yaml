services:
  - type: web
    name: konyvkocka
    env: docker
    plan: starter
    dockerContext: .
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_FORWARDEDHEADERS_ENABLED
        value: "true"
      - key: DB_HOST
        value: konyvkocka-db-konyvkocka.g.aivencloud.com
      - key: DB_PORT
        value: "15880"
      - key: DB_NAME
        value: konyvkocka
      - key: DB_USER
        value: avnadmin
      - key: DB_PASSWORD
        value: to-fill-aiven-password
        sync: false
      - key: DB_SSL_MODE
        value: Required
      - key: JwtSettings__SecurityKey
        generateValue: true
      - key: JwtSettings__Issuer
        value: konyvkocka
      - key: JwtSettings__Audience
        value: konyvkocka-users
      - key: JwtSettings__ExpirityMinutes
        value: "1440"
      - key: EmailSettings__SmtpHost
        value: smtp-relay.brevo.com
      - key: EmailSettings__SmtpPort
        value: "2525"
      - key: EmailSettings__SmtpUsername
        value: a829a8001@smtp-brevo.com
      - key: EmailSettings__SmtpPassword
        value: to-fill-brevo-smtp-key
        sync: false
      - key: EmailSettings__FromEmail
        value: bordas.daniel0124@gmail.com
      - key: EmailSettings__FromName
        value: Könyvkocka csapat
      - key: AppUrlSettings__FrontendBaseUrl
        value: https://konyvkocka.onrender.com
      - key: AppUrlSettings__ApiBaseUrl
        value: https://konyvkocka.onrender.com
