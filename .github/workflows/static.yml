name: Deploy React App to Pages

on:
  push:
    branches: ["releases"] # Csak akkor fut le, ha a "releases" ágra pusholsz. Biztos ez a fő branched? Ha nem, írd át main-re!
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        working-directory: ./konyvkocka

      - name: Build project
        run: bun run build
        working-directory: ./konyvkocka
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Itt is meg kell adni az utat a dist mappához!
          path: './konyvkocka/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
