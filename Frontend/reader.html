<!DOCTYPE html>
<html lang="hu">

  <title>PDF Olvasó – KönyvKocka</title>

  <link rel="stylesheet" href="./src/css/reader.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="icon" type="image/x-icon" href="https://img.pikbest.com/origin/09/26/29/82YpIkbEsTegM.png!sw800">
</head>
<body class="bg-dark text-light">

<!-- Navbar (copied 1:1) -->
<nav class="navbar navbar-expand-lg navbar-dark navbar-custom fixed-top">
  <div class="container-fluid">
    <!-- Logo -->
    <div class="navbar-brand-container">
      <img src="https://img.pikbest.com/origin/09/26/29/82YpIkbEsTegM.png!sw800" alt="Logo" class="navbar-logo">

    </div>

    <!-- Hamburger menu -->
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Menü -->
    <div class="collapse navbar-collapse" id="mainNavbar">
      <!-- Bal oldali menü elemek -->
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link active" href="./index.html">Kezdőlap</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="./search.html">Keresés</a>
        </li>
        <li class="nav-item">
          <a class="nav-link active" href="./support.html">Támogatás</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="./about.html">Rólunk</a>
        </li>
      </ul>

      <!-- Jobb oldali elemek -->
      <ul class="navbar-nav">

        <li class="nav-item">
          <a class="nav-link" href="./login.html"><i class="bi bi-person-circle"></i> Bejelentkezés</a>
        </li>
     
      </ul>
    </div>
  </div>
</nav>

<!-- Reader Container -->
<div class="reader-container">
  <!-- Sidebar with book info and controls -->
  <aside class="reader-sidebar" id="readerSidebar">
    <div class="sidebar-header">
      <button class="btn-icon" id="closeSidebar" title="Bezárás">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>
    
    <div class="book-info">
      <div class="book-cover" id="bookCover">
        <i class="bi bi-book-fill"></i>
      </div>
      <h3 class="book-title" id="bookTitle">Könyv címe</h3>
      <p class="book-author" id="bookAuthor">Szerző neve</p>
    </div>

    <div class="reader-controls">
      <div class="control-group">
        <label class="control-label">Oldal navigáció</label>
        <div class="page-nav">
          <button class="btn-control" id="prevPage" title="Előző oldal">
            <i class="bi bi-chevron-left"></i>
          </button>
          <div class="page-info">
            <input type="number" class="page-input" id="pageInput" min="1" value="1">
            <span class="page-total">/ <span id="pageTotal">-</span></span>
          </div>
          <button class="btn-control" id="nextPage" title="Következő oldal">
            <i class="bi bi-chevron-right"></i>
          </button>
        </div>
      </div>

      <div class="control-group">
        <label class="control-label">Zoom</label>
        <div class="zoom-controls">
          <button class="btn-control" id="zoomOut" title="Kicsinyítés">
            <i class="bi bi-dash-lg"></i>
          </button>
          <span class="zoom-level" id="zoomLevel">100%</span>
          <button class="btn-control" id="zoomIn" title="Nagyítás">
            <i class="bi bi-plus-lg"></i>
          </button>
        </div>
        <input type="range" class="zoom-slider" id="zoomSlider" min="50" max="200" value="100" step="10">
      </div>



      <div class="control-group">
        <label class="control-label">Könyvjelzők</label>
        <button class="btn-bookmark" id="addBookmark">
          <i class="bi bi-bookmark-plus"></i> Könyvjelző hozzáadása
        </button>
        <div class="bookmarks-list" id="bookmarksList">
          <!-- Bookmarks will be populated here -->
        </div>
      </div>
    </div>

    <div class="sidebar-footer">
      <button class="btn-action" id="downloadPdf">
        <i class="bi bi-download me-2"></i> Letöltés
      </button>
      <a href="./search.html" class="btn-action btn-outline">
        <i class="bi bi-arrow-left me-2"></i> Vissza
      </a>
    </div>
  </aside>

  <!-- Main reader area -->
  <main class="reader-main">
    <!-- Top toolbar -->
    <div class="reader-toolbar">
      <button class="btn-icon" id="toggleSidebar">
        <i class="bi bi-list"></i>
      </button>
      <div class="toolbar-title">
        <span id="toolbarTitle">PDF Olvasó</span>
      </div>
      <div class="toolbar-actions">
        <button class="btn-icon" id="rotateLeft" title="Forgatás balra">
          <i class="bi bi-arrow-counterclockwise"></i>
        </button>
        <button class="btn-icon" id="rotateRight" title="Forgatás jobbra">
          <i class="bi bi-arrow-clockwise"></i>
        </button>
      </div>
    </div>


    <!-- PDF Canvas Container -->
    <div class="pdf-viewer" id="pdfViewer">
      <div class="loading-state" id="loadingState">
        <div class="spinner-border text-warning" role="status">
          <span class="visually-hidden">Betöltés...</span>
        </div>
        <p class="mt-3">PDF betöltése folyamatban...</p>
      </div>
      
      <div class="error-state d-none" id="errorState">
        <i class="bi bi-exclamation-triangle-fill text-warning" style="font-size: 3rem;"></i>
        <h3 class="mt-3">Hiba történt</h3>
        <p id="errorMessage">A PDF fájl nem tölthető be.</p>
        <a href="./search.html" class="btn btn-outline-light mt-3">
          <i class="bi bi-arrow-left me-2"></i> Vissza a kereséshez
        </a>
      </div>

      <canvas id="pdfCanvas" class="pdf-canvas"></canvas>
    </div>

    <!-- Bottom navigation bar -->
    <div class="reader-bottom-nav">
      <button class="btn-nav" id="prevPageBottom">
        <i class="bi bi-chevron-left"></i> Előző
      </button>
      <div class="page-indicator">
        <span id="currentPageBottom">1</span> / <span id="totalPagesBottom">-</span>
      </div>
      <button class="btn-nav" id="nextPageBottom">
        Következő <i class="bi bi-chevron-right"></i>
      </button>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
(function(){
  // PDF.js worker setup
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  let pdfDoc = null;
  let pageNum = 1;
  let pageRendering = false;
  let pageNumPending = null;
  let scale = 1.0;
  let rotation = 0;
  let bookmarks = [];

  const canvas = document.getElementById('pdfCanvas');
  const ctx = canvas.getContext('2d');
  const loadingState = document.getElementById('loadingState');
  const errorState = document.getElementById('errorState');
  const viewerEl = document.getElementById('pdfViewer');

  // Get PDF URL from query parameter or use test PDF
  const urlParams = new URLSearchParams(window.location.search);
  const pdfUrl = urlParams.get('pdf') || './src/pdf/Antoine_de_Saint_Exupery_A_kis_herceg_1.pdf';

  // Load PDF document
  function loadPDF(url){
    loadingState.classList.remove('d-none');
    errorState.classList.add('d-none');
    canvas.style.display = 'none';

    pdfjsLib.getDocument(url).promise.then(function(pdf){
      pdfDoc = pdf;
      document.getElementById('pageTotal').textContent = pdf.numPages;
      document.getElementById('totalPagesBottom').textContent = pdf.numPages;
      document.getElementById('pageInput').max = pdf.numPages;
      
      // Load metadata if available
      pdf.getMetadata().then(function(data){
        if(data.info){
          document.getElementById('bookTitle').textContent = data.info.Title || 'Ismeretlen cím';
          document.getElementById('bookAuthor').textContent = data.info.Author || 'Ismeretlen szerző';
          document.getElementById('toolbarTitle').textContent = data.info.Title || 'PDF Olvasó';
        }
      });

      loadingState.classList.add('d-none');
      canvas.style.display = 'block';
      renderPage(pageNum);
    }).catch(function(error){
      console.error('PDF loading error:', error);
      loadingState.classList.add('d-none');
      errorState.classList.remove('d-none');
      document.getElementById('errorMessage').textContent = 'A PDF fájl nem található vagy sérült.';
    });
  }

  // Render page
  function renderPage(num){
    pageRendering = true;
    pdfDoc.getPage(num).then(function(page){
      const viewport = page.getViewport({scale: scale, rotation: rotation});
      canvas.height = viewport.height;
      canvas.width = viewport.width;

      const renderContext = {
        canvasContext: ctx,
        viewport: viewport
      };

      const renderTask = page.render(renderContext);

      renderTask.promise.then(function(){
        pageRendering = false;
        // If a zoom anchor is pending, restore scroll roughly to the same relative position
        if(pendingScrollRatio !== null && viewerEl){
          const targetCenter = pendingScrollRatio * canvas.height;
          viewerEl.scrollTop = Math.max(0, targetCenter - viewerEl.clientHeight/2);
          pendingScrollRatio = null;
        }
        if(pageNumPending !== null){
          renderPage(pageNumPending);
          pageNumPending = null;
        }
      });
    });

    // Update page counters
    document.getElementById('pageInput').value = num;
    document.getElementById('currentPageBottom').textContent = num;
  }

  // Queue render
  function queueRenderPage(num){
    if(pageRendering){
      pageNumPending = num;
    } else {
      renderPage(num);
    }
  }

  // Navigation functions
  function prevPage(){
    if(pageNum <= 1) return;
    pageNum--;
    queueRenderPage(pageNum);
  }

  function nextPage(){
    if(pageNum >= pdfDoc.numPages) return;
    pageNum++;
    queueRenderPage(pageNum);
  }

  function goToPage(num){
    if(num < 1 || num > pdfDoc.numPages) return;
    pageNum = num;
    queueRenderPage(pageNum);
  }

  // Zoom functions
  function updateZoom(newScale){
    // store scroll anchor (viewer center relative to canvas height) to keep position after re-render
    if(viewerEl && canvas && canvas.height){
      const center = viewerEl.scrollTop + viewerEl.clientHeight/2;
      pendingScrollRatio = Math.max(0, Math.min(1, center / canvas.height));
    }
    scale = newScale / 100;
    document.getElementById('zoomLevel').textContent = newScale + '%';
    document.getElementById('zoomSlider').value = newScale;
    queueRenderPage(pageNum);
  }

  function zoomIn(){
    const currentZoom = parseInt(document.getElementById('zoomSlider').value);
    if(currentZoom < 200){
      updateZoom(currentZoom + 10);
    }
  }

  function zoomOut(){
    const currentZoom = parseInt(document.getElementById('zoomSlider').value);
    if(currentZoom > 50){
      updateZoom(currentZoom - 10);
    }
  }

  // Rotation
  function rotatePageLeft(){
    rotation = (rotation - 90) % 360;
    queueRenderPage(pageNum);
  }

  function rotatePageRight(){
    rotation = (rotation + 90) % 360;
    queueRenderPage(pageNum);
  }

  // Keep track of desired scroll position across zoom re-render
  let pendingScrollRatio = null;

  // Fullscreen toggle (safe if no button exists)
  function toggleFullscreen(){
    if(!document.fullscreenElement){
      document.documentElement.requestFullscreen();
    } else {
      document.exitFullscreen();
    }
  }

  // Sidebar toggle
  const sidebar = document.getElementById('readerSidebar');
  const toggleBtn = document.getElementById('toggleSidebar');
  const closeBtn = document.getElementById('closeSidebar');

  toggleBtn.addEventListener('click', ()=> {
    if(window.innerWidth <= 768){
      sidebar.classList.toggle('show');
    } else {
      sidebar.classList.toggle('collapsed');
    }
  });
  closeBtn.addEventListener('click', ()=> {
    if(window.innerWidth <= 768){
      sidebar.classList.remove('show');
    } else {
      sidebar.classList.add('collapsed');
    }
  });

  // Keep state consistent across resizes
  window.addEventListener('resize', ()=> {
    if(window.innerWidth <= 768){
      // On mobile we use off-canvas 'show' behavior
      sidebar.classList.remove('collapsed');
    } else {
      // On desktop we don't use 'show'
      sidebar.classList.remove('show');
    }
  });


  // Bookmarks
  function addBookmark(){
    const bookmark = {
      page: pageNum,
      title: 'Oldal ' + pageNum,
      timestamp: new Date().toLocaleString('hu-HU')
    };
    bookmarks.push(bookmark);
    updateBookmarksList();
    localStorage.setItem('kk_bookmarks_' + pdfUrl, JSON.stringify(bookmarks));
  }

  function updateBookmarksList(){
    const list = document.getElementById('bookmarksList');
    if(bookmarks.length === 0){
      list.innerHTML = '<p class="text small">Még nincsenek könyvjelzők</p>';
      return;
    }
    let html = '';
    bookmarks.forEach((bm, idx)=>{
      html += `<div class="bookmark-item">
        <div class="bookmark-info" onclick="goToPage(${bm.page})">
          <i class="bi bi-bookmark-fill me-2"></i>
          <span>${bm.title}</span>
        </div>
        <button class="btn-remove" onclick="removeBookmark(${idx})">
          <i class="bi bi-x"></i>
        </button>
      </div>`;
    });
    list.innerHTML = html;
  }

  window.removeBookmark = function(idx){
    bookmarks.splice(idx, 1);
    updateBookmarksList();
    localStorage.setItem('kk_bookmarks_' + pdfUrl, JSON.stringify(bookmarks));
  };

  window.goToPage = goToPage;

  // Load saved bookmarks
  const savedBookmarks = localStorage.getItem('kk_bookmarks_' + pdfUrl);
  if(savedBookmarks){
    bookmarks = JSON.parse(savedBookmarks);
    updateBookmarksList();
  }

  // Event listeners
  document.getElementById('prevPage').addEventListener('click', prevPage);
  document.getElementById('nextPage').addEventListener('click', nextPage);
  document.getElementById('prevPageBottom').addEventListener('click', prevPage);
  document.getElementById('nextPageBottom').addEventListener('click', nextPage);
  
  document.getElementById('pageInput').addEventListener('change', (e)=> {
    goToPage(parseInt(e.target.value));
  });

  document.getElementById('zoomIn').addEventListener('click', zoomIn);
  document.getElementById('zoomOut').addEventListener('click', zoomOut);
  const zoomSlider = document.getElementById('zoomSlider');
  const normZoom = (v)=> Math.max(50, Math.min(200, parseInt(v)||100));
  if(zoomSlider){
    zoomSlider.addEventListener('input', (e)=> { updateZoom(normZoom(e.target.value)); });
    zoomSlider.addEventListener('change', (e)=> { updateZoom(normZoom(e.target.value)); });
    zoomSlider.addEventListener('touchend', (e)=> { updateZoom(normZoom(e.target.value)); });
  }

  document.getElementById('rotateLeft').addEventListener('click', rotatePageLeft);
  document.getElementById('rotateRight').addEventListener('click', rotatePageRight);

  document.getElementById('addBookmark').addEventListener('click', addBookmark);
  const fullscreenBtn = document.getElementById('fullscreen');
  if(fullscreenBtn){
    fullscreenBtn.addEventListener('click', toggleFullscreen);
  }

  document.getElementById('downloadPdf').addEventListener('click', ()=> {
    window.open(pdfUrl, '_blank');
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', (e)=> {
    if(e.key === 'ArrowLeft') prevPage();
    if(e.key === 'ArrowRight') nextPage();
    if(e.key === '+' || e.key === '=') zoomIn();
    if(e.key === '-') zoomOut();
    if(e.key === 'f') toggleFullscreen();
  });

  // Initialize
  loadPDF(pdfUrl);
})();
</script>
</body>
</html>
